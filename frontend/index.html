<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO básico -->
    <title>La Palacio Libros</title>
    <meta
      name="description"
      content="Librería virtual marika y lesbiana. Libros, fanzines y más."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/lapalacio-logo.svg" />

    <!--
      preconnect: el navegador abre la conexión TCP+TLS con Cloudinary y el API
      antes de que el JS los necesite. Ahorra ~200-400ms en el primer request
      de imagen y de datos.

    -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="preconnect" href="https://api.cloudinary.com" crossorigin />
    <link rel="preconnect" href="https://api.emailjs.com" crossorigin />


    <!--
      dns-prefetch: fallback para browsers que no soportan preconnect.
      Sin costo extra, siempre conviene incluirlo.
    -->
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://api.emailjs.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
